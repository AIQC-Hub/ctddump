name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev libnetcdf-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Locate HDF5 installation
        run: |
          echo "=== pkg-config ==="
          pkg-config --modversion hdf5 2>/dev/null || echo "hdf5 not found via pkg-config"
          pkg-config --modversion hdf5-serial 2>/dev/null || echo "hdf5-serial not found via pkg-config"
          echo "=== .pc files ==="
          find /usr -name "hdf5*.pc" 2>/dev/null
          echo "=== libhdf5 headers ==="
          find /usr -name "hdf5.h" 2>/dev/null

      - name: Download test data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/fetch_test_data.sh

      - name: Run tests
        env:
          HDF5_DIR: /usr/lib/x86_64-linux-gnu/hdf5/serial
        run: cargo test
