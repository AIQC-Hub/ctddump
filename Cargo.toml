[package]
name = "ctddump"
version = "0.1.0"
edition = "2021"

[dependencies]
num-traits = "0.2"
chrono = "0.4"
netcdf = { version = "0.10", features = ["ndarray"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
polars = { version = "0.43", features = ["ndarray", "parquet", "dtype-i8"] }
gsw = "0.2.2"

[features]
trace = []
